<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Intel Dashboard</title>

    <script>
        (function() {
            var storedTheme = localStorage.getItem('travelintel_theme');
            var prefersDark = window.matchMedia &&
                window.matchMedia('(prefers-color-scheme: dark)').matches;
            var theme = storedTheme || (prefersDark ? 'dark' : 'light');

            document.documentElement.classList.add(theme === 'dark' ? 'theme-dark' : 'theme-light');
        })();
    </script>
    
    <style>
        :root {
            --color-bg: #FFFFFF;
            --color-surface: #F5F5F5;
            --color-text-primary: #333333;
            --color-text-secondary: #666666;
            --color-accent: #1D9E75;
            --color-primary: #1A3C6E;
            --color-primary-mid: #2E6DB4;
            --color-danger: #D32F2F;
            --color-success: #388E3C;
            --color-warning: #F57C00;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --font-size-base: 16px;
            --radius-card: 12px;
            --radius-badge: 8px;
            --z-modal: 100;
            --z-overlay: 90;
            --z-tooltip: 80;
            --z-nav: 70;
        }
    </style>

    <!-- CSS 設計系統載入 -->
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/charts.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1 id="app-title" class="app-title">travelintel</h1>
      <nav class="app-nav" aria-label="Primary" role="tablist">
          <button id="nav-dashboard" class="nav-btn active" type="button" role="tab" aria-controls="tab-dashboard" aria-selected="true">Dashboard</button>
          <button id="nav-flights" class="nav-btn" type="button" role="tab" aria-controls="tab-flights" aria-selected="false">Flights</button>
          <button id="nav-price-history" class="nav-btn" type="button" role="tab" aria-controls="tab-price-history" aria-selected="false">Price History</button>
      </nav>
      <div>
        <button id="lang-toggle" class="theme-btn" type="button" aria-label="Toggle language">繁體中文</button>
        <button id="theme-toggle" class="theme-btn" type="button" aria-label="Toggle theme">Theme</button>
      </div>
    </header>

    <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

    <!-- Dashboard Tab -->
    <section id="tab-dashboard" class="tab-panel" role="tabpanel" aria-labelledby="nav-dashboard">
        <div class="tracking-header">
          <div class="flex gap-md items-center">
            <h2 id="dashboard-title"></h2>
            <div id="tracking-tabs" class="flex gap-sm"></div>
          </div>
          <button id="tracking-add-btn" class="btn btn--primary" type="button" data-i18n="add_tracking">+ Add Tracking</button>
        </div>

        <div id="dashboard-search-bar" class="trip-search-bar">
          <div class="search-field">
            <label id="label-origin" for="dash-origin" class="search-field__label">出發地</label>
            <input type="text" id="dash-origin" placeholder="例：TPE" aria-label="Origin Airport Code">
          </div>
          <div class="search-divider"></div>
          <div class="search-field">
            <label id="label-dest" for="dash-dest" class="search-field__label">抵達地</label>
            <input type="text" id="dash-dest" placeholder="例：NRT" aria-label="Destination Airport Code">
          </div>
          <div class="search-divider"></div>
          <div class="search-field">
            <label id="label-start" for="dash-start" class="search-field__label">去程日期</label>
            <input type="date" id="dash-start" aria-label="Departure Date">
          </div>
          <div class="search-divider"></div>
          <div class="search-field">
            <label id="label-end" for="dash-end" class="search-field__label">回程日期</label>
            <input type="date" id="dash-end" aria-label="Return Date">
          </div>
          <button id="dash-search-btn" class="btn btn--primary" type="button" data-i18n="search">Search</button>
        </div>


        <div class="metrics-grid metrics-grid--dashboard">
            <div id="metric-fun-score"></div>
            <div id="metric-flight-price"></div>
            <div id="metric-hotel-price"></div>
            <div id="metric-weather"></div>
        </div>

        <div class="dashboard-stack">
           <div class="panel panel--chart panel--trend">
               <canvas id="chart-trend"></canvas>
           </div>
           <div class="panel panel--travelintel" id="slider-container"></div>
           <div class="panel panel--heatmap">
               <div id="chart-heatmap"></div>
           </div>
        </div>
    </section>

    <!-- Flights Tab -->
    <section id="tab-flights" class="tab-panel" role="tabpanel" aria-labelledby="nav-flights" hidden>
        <div id="flight-results"></div>
        <button id="compare-btn" class="btn btn--primary" type="button" data-i18n="compare">Compare Selected</button>
    </section>

    <!-- Price History Tab -->
    <section id="tab-price-history" class="tab-panel" role="tabpanel" aria-labelledby="nav-price-history" hidden>
        <div id="advice-banner" class="advice-banner"></div>
        <div class="panel panel--chart panel--price-history mt-md"><canvas id="chart-yoy"></canvas></div>
        <div class="panel panel--chart panel--price-history mt-md"><canvas id="chart-fullyear"></canvas></div>
    </section>
  </div>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

    <!-- 全域 JS 命名空間初始化 -->
    <script>
        window.TravelIntel = {
            app: {},
            dashboard: {},
            charts: {},
            flightSearch: {},
            priceHistory: {}
        };
    </script>

    <!-- 模組載入 (依順序) -->
    <script src="/js/app.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/charts.js"></script>
    <script src="/js/flightSearch.js"></script>
    <script src="/js/priceHistory.js"></script>
</body>
</html>
